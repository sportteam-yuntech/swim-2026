<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Anton&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
        background: #b8e4f9; 
        font-family: 'Noto Sans TC', sans-serif; 
        display: flex; 
        justify-content: center; 
        padding: 20px;
    }

    .poster { 
        width: 210mm; 
        background: linear-gradient(170deg, #fffde8 0%, #e0f7ff 50%, #c8eeff 100%); 
        border-radius: 30px;
        position: relative; 
        box-shadow: 0 20px 60px rgba(0, 100, 200, 0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .wave-top { height: 10px; background: linear-gradient(90deg, #ff9d00, #ffce00, #00d4ff, #0099ff, #ff4d8d); flex-shrink: 0; }
    
    .hero-section {
        width: 100%;
        height: 220px; 
        background: #4fc3f7;
        position: relative;
        overflow: hidden;
    }

    .swim-canvas {
        width: 100%;
        height: 100%;
        display: block;
    }

    .content { 
        position: relative; 
        z-index: 10; 
        padding: 30px 60px 40px; 
        flex-grow: 1;
    }

    .badge-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .badge { background: #0099ff; color: white; font-size: 14px; font-weight: 900; letter-spacing: 2px; padding: 8px 20px; border-radius: 40px; }
    .year-badge { background: #ffce00; color: #5a3a00; font-size: 14px; font-weight: 900; letter-spacing: 2px; padding: 8px 20px; border-radius: 40px; }

    .title-block { text-align: center; margin-bottom: 30px; }
    .main-title { font-family: 'Anton', sans-serif; font-size: 90px; line-height: 0.9; color: #003f8a; letter-spacing: 4px; }
    .subtitle-cn { font-size: 34px; font-weight: 900; color: #005cbf; letter-spacing: 10px; margin-top: 5px; }

    .early-bird-card {
        background: linear-gradient(135deg, #ff8c00, #ffce00);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        margin-bottom: 30px;
        box-shadow: 0 8px 20px rgba(255,140,0,0.15);
    }

    .price-card-full { background: linear-gradient(135deg, #0088ff, #005cbf); border-radius: 18px; padding: 20px 35px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; color: white; }
    .pf-price { font-size: 38px; font-weight: 900; color: #ffce00; }

    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .price-card { background: white; border: 2px solid #c8e8ff; border-radius: 20px; padding: 20px; text-align: center; border-bottom: 5px solid #0099ff; }

    .note-box { background: #fffbe6; border-left: 6px solid #ffce00; border-radius: 0 15px 15px 0; padding: 20px; margin-bottom: 30px; }
    
    .line-section { background: white; border: 3px solid #b7f0cc; border-radius: 20px; padding: 20px 35px; display: flex; align-items: center; gap: 20px; }
    .line-icon { width: 60px; height: 60px; background: #06c755; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }

    @media print { body { padding: 0; } .poster { box-shadow: none; width: 100%; } }
</style>
</head>
<body>
<div class="poster">
    <div class="wave-top"></div>

    <div class="hero-section">
        <svg class="swim-canvas" preserveAspectRatio="xMidYMid slice" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#4fc3f7"/>
                    <stop offset="100%" stop-color="#b3e5fc"/>
                </linearGradient>
                <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#0277bd"/>
                    <stop offset="100%" stop-color="#01579b"/>
                </linearGradient>
                <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff9c4"/>
                    <stop offset="100%" stop-color="#fbc02d"/>
                </radialGradient>
            </defs>

            <!-- 背景天空 -->
            <rect width="800" height="220" fill="url(#skyGrad)"/>

            <!-- 1. 太陽 (旋轉動畫) -->
            <g transform="translate(60, 55)">
                <circle r="25" fill="url(#sunGrad)" filter="drop-shadow(0 0 8px #fbc02d)"/>
                <g fill="none" stroke="#fbc02d" stroke-width="4" stroke-linecap="round">
                    <path d="M0 -35 L0 -45" /> <path d="M0 35 L0 45" />
                    <path d="M35 0 L45 0" /> <path d="M-35 0 L-45 0" />
                    <path d="M25 25 L32 32" /> <path d="M-25 -25 L-32 -32" />
                    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="20s" repeatCount="indefinite"/>
                </g>
            </g>

            <!-- 2. 白雲 (左右飄動) -->
            <g fill="white" opacity="0.8">
                <g>
                    <animateTransform attributeName="transform" type="translate" values="200,40; 260,40; 200,40" dur="15s" repeatCount="indefinite"/>
                    <ellipse cx="0" cy="0" rx="30" ry="12"/>
                    <circle cx="-15" cy="0" r="15"/><circle cx="15" cy="0" r="18"/>
                </g>
                <g>
                    <animateTransform attributeName="transform" type="translate" values="550,60; 500,60; 550,60" dur="12s" repeatCount="indefinite"/>
                    <ellipse cx="0" cy="0" rx="40" ry="15"/>
                    <circle cx="-20" cy="0" r="20"/><circle cx="20" cy="0" r="15"/>
                </g>
            </g>
            
            <!-- 動態水面波浪 -->
            <path d="M0 125 Q200 105 400 125 T800 125 L800 220 L0 220 Z" fill="#039be5" opacity="0.4">
                <animate attributeName="d" values="M0 125 Q200 105 400 125 T800 125 L800 220 L0 220 Z; M0 125 Q200 145 400 125 T800 125 L800 220 L0 220 Z; M0 125 Q200 105 400 125 T800 220 L800 220 L0 220 Z" dur="5s" repeatCount="indefinite"/>
            </path>
            
            <!-- 深水底色 -->
            <rect y="165" width="800" height="55" fill="url(#seaGrad)"/>

            <!-- 游泳者 1 (紅) -->
            <g transform="translate(180, 140)">
                <animateTransform attributeName="transform" type="translate" values="180,140; 220,140; 180,140" dur="5s" repeatCount="indefinite"/>
                <g transform="scale(0.8)">
                    <!-- 手臂 -->
                    <path d="M-25,8 L-10,-5 M25,8 L10,-5" stroke="#ffccbc" stroke-width="6" stroke-linecap="round">
                        <animateTransform attributeName="transform" type="rotate" values="-15;15;-15" dur="1s" repeatCount="indefinite"/>
                    </path>
                    <!-- 身體 -->
                    <ellipse cx="0" cy="5" rx="28" ry="12" fill="#ffccbc"/>
                    <!-- 泳帽 -->
                    <path d="M16,-5 Q30,-22 44,-5 Z" fill="#ff5252"/>
                    <!-- 臉部 -->
                    <circle cx="30" cy="0" r="11" fill="#ffe0b2"/>
                    <!-- 黑色小眼睛 (圓點式) -->
                    <circle cx="34" cy="-2" r="2.5" fill="#333"/>
                    <circle cx="35" cy="-3" r="0.8" fill="white" opacity="0.8"/> <!-- 高光點 -->
                </g>
            </g>

            <!-- 游泳者 2 (黃) -->
            <g transform="translate(480, 125)">
                <animateTransform attributeName="transform" type="translate" values="480,125; 440,125; 480,125" dur="7s" repeatCount="indefinite"/>
                <g transform="scale(0.9)">
                    <!-- 手臂 -->
                    <path d="M-25,8 L-10,-5 M25,8 L10,-5" stroke="#ffccbc" stroke-width="6" stroke-linecap="round">
                        <animateTransform attributeName="transform" type="rotate" values="15;-15;15" dur="1.2s" repeatCount="indefinite"/>
                    </path>
                    <!-- 身體 -->
                    <ellipse cx="0" cy="5" rx="28" ry="12" fill="#ffccbc"/>
                    <!-- 泳帽 -->
                    <path d="M16,-5 Q30,-22 44,-5 Z" fill="#ffce00"/>
                    <!-- 臉部 -->
                    <circle cx="30" cy="0" r="11" fill="#ffe0b2"/>
                    <!-- 黑色小眼睛 (圓點式) -->
                    <circle cx="34" cy="-2" r="2.5" fill="#333"/>
                    <circle cx="35" cy="-3" r="0.8" fill="white" opacity="0.8"/> <!-- 高光點 -->
                </g>
            </g>

            <!-- 小魚 -->
            <g fill="rgba(255,255,255,0.4)">
                <g transform="translate(100, 185)">
                    <animateTransform attributeName="transform" type="translate" values="100,185; 150,185; 100,185" dur="4s" repeatCount="indefinite"/>
                    <circle cx="15" cy="10" r="7"/>
                    <path d="M7 10 L0 6 L0 14 Z"/>
                </g>
                <g transform="translate(350, 195)">
                    <animateTransform attributeName="transform" type="translate" values="350,195; 300,195; 350,195" dur="6s" repeatCount="indefinite"/>
                    <circle cx="15" cy="10" r="6"/>
                    <path d="M7 10 L0 6 L0 14 Z"/>
                </g>
            </g>

            <!-- 氣泡 -->
            <circle cx="210" cy="190" r="2" fill="white" opacity="0.5">
                <animate attributeName="cy" values="190;130" dur="2s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.5;0" dur="2s" repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>

    <div class="content">
        <div class="badge-row">
            <div class="badge">🏊 SUMMER CAMP</div>
            <div class="year-badge">2026 雲科大</div>
        </div>

        <div class="title-block">
            <div class="main-title">SWIM</div>
            <div class="subtitle-cn">暑期游泳訓練班</div>
        </div>

        <div class="early-bird-card">
            <div style="font-size:22px; font-weight:900; color:#1a0000; letter-spacing:2px;">⚡ 早鳥優惠：05/15 — 06/15 ⚡</div>
            <div style="font-size:16px; color:#444; margin-top:8px; font-weight:600;">早鳥期間報名，每人現享 9 折優惠！</div>
        </div>

        <div class="price-card-full">
            <div style="font-size:24px; font-weight:900; letter-spacing:1px;">精英一對一 個人班</div>
            <div class="pf-price">$11,000<small style="font-size:16px;"> /期</small></div>
        </div>

        <div class="price-grid">
            <div class="price-card">
                <div style="font-size:16px; color:#666; font-weight:900;">1 VS 2</div>
                <div style="font-size:30px; font-weight:900; color:#003f8a;">$13,000<small style="font-size:14px;">/期</small></div>
            </div>
            <div class="price-card">
                <div style="font-size:16px; color:#666; font-weight:900;">1 VS 3</div>
                <div style="font-size:30px; font-weight:900; color:#003f8a;">$15,000<small style="font-size:14px;">/期</small></div>
            </div>
            <div class="price-card">
                <div style="font-size:16px; color:#666; font-weight:900;">1 VS 4</div>
                <div style="font-size:30px; font-weight:900; color:#003f8a;">$18,000<small style="font-size:14px;">/期</small></div>
            </div>
            <div class="price-card">
                <div style="font-size:16px; color:#666; font-weight:900;">1 VS 5</div>
                <div style="font-size:30px; font-weight:900; color:#003f8a;">$21,000<small style="font-size:14px;">/期</small></div>
            </div>
        </div>

        <div class="note-box">
            <div style="font-size:16px; color:#5a4000; line-height:1.7; font-weight:600;">
                📌 <strong>每期共 10 堂（10 小時）</strong>。<br>
                📌 1VS2 以上班級需<strong>自行湊滿人數</strong>報名。
            </div>
        </div>

        <div class="line-section">
            <div class="line-icon">💬</div>
            <div>
                <div style="font-size:30px; font-weight:900; color:#003a20;">LINE ID: @900ddpsi</div>
                <div style="font-size:14px; color:#666; font-weight:600;">立即諮詢與報名 ✉️</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
